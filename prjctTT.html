<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TT Project</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  color:#00ff41;
  font-family:monospace;
  overflow:hidden;
}

/* TEXTO PRINCIPAL */
#mainText{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:32px;
}

/* TELA HACK */
#hackScreen{
  position:absolute;
  width:100%;
  height:100%;
  padding:20px;
  display:none;
  overflow:hidden;
}

/* PROGRESS BAR */
#progressContainer{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:4px;
  background:#111;
  display:none;
}

#progressBar{
  width:0%;
  height:100%;
  background:#00ff41;
}

/* IMAGEM FLASH */
#flashImg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

/* ERRO FINAL */
#erroFinal{
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#ff0000;
  font-size:40px;
  font-weight:bold;
}

#erroFinal small{
  color:#fff;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="mainText">TT is backing</div>

<div id="hackScreen"></div>

<img id="flashImg" src="cmd.png">

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div id="erroFinal">
  <div>ERRO 929</div>
  <small>Stop... here... NOW...</small>
</div>

<script>

const FLAG = "tt_persistent_error";

const hackScreen = document.getElementById("hackScreen");
const mainText = document.getElementById("mainText");
const flashImg = document.getElementById("flashImg");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");
const erroFinal = document.getElementById("erroFinal");


if(localStorage.getItem(FLAG) === "1"){
  mostrarErroFinal();
}else{
  iniciarSequencia();
}


function iniciarSequencia(){

  setTimeout(()=>{
    iniciarHack();
  },10000);

}


function iniciarHack(){

  mainText.style.display = "none";
  hackScreen.style.display = "block";

  const linhas = [
    "Initializing TT protocol...",
    "Bypassing firewall...",
    "Injecting payload...",
    "Accessing system kernel...",
    "Scanning environment...",
    "Locating subject...",
    "Decrypting memory blocks...",
    "Connection established...",
    "Uploading data..."
  ];

  let i = 0;

  function escrever(){
    if(i < linhas.length){
      const p = document.createElement("div");
      p.textContent = "> " + linhas[i];
      hackScreen.appendChild(p);
      i++;
      setTimeout(escrever, 300);
    }else{
      faseFlash();
    }
  }

  escrever();
}


function faseFlash(){

  hackScreen.style.display = "none";
  flashImg.style.display = "block";

  setTimeout(()=>{
    flashImg.style.display = "none";
    faseBarra();
  },100); 
}


function faseBarra(){

  progressContainer.style.display = "block";

  let progresso = 0;

  const intervalo = setInterval(()=>{
    progresso += 5;
    progressBar.style.width = progresso + "%";

    if(progresso >= 100){
      clearInterval(intervalo);
      faseAcesso();
    }

  }, 200); 
}


function faseAcesso(){

  progressContainer.style.display = "none";

  const txt = document.createElement("div");
  txt.style.position = "absolute";
  txt.style.top = "50%";
  txt.style.left = "50%";
  txt.style.transform = "translate(-50%, -50%)";
  txt.style.color = "#00ff41";
  txt.style.fontSize = "24px";

  txt.textContent = "ACESS : IP#jdhfuuejfnfjkvhhhf##";

  document.body.appendChild(txt);

  setTimeout(()=>{
    txt.remove();
    ativarErroFinal();
  },2000);
}

/* FASE FINAL */
function ativarErroFinal(){

  localStorage.setItem(FLAG,"1");
  mostrarErroFinal();

  console.error("##ERROR 929## SYSTEM LOCKED");

}

function mostrarErroFinal(){

  erroFinal.style.display = "flex";

}

// RESET SECRETO
let buffer = "";

document.addEventListener("keydown", (e) => {

  buffer += e.key.toLowerCase();

  if(buffer.length > 50){
    buffer = buffer.slice(-50);
  }

  if(buffer.includes("pr return")){
    localStorage.removeItem("tt_persistent_error");
    location.reload();
  }

});

</script>

</body>
</html>
